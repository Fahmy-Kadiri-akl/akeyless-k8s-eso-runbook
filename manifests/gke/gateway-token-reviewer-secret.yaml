---
# Secret: Long-lived token for the gateway-token-reviewer ServiceAccount.
# Kubernetes 1.24+ requires explicit Secret creation for long-lived SA tokens.
# The token controller will populate .data.token after creation.
#
# Prerequisites:
#   - gateway-token-reviewer ServiceAccount must exist (apply gateway-token-reviewer-sa.yaml first)
#
# Usage:
#   kubectl apply -f gateway-token-reviewer-secret.yaml
#
# Retrieve the token:
#   kubectl get secret gateway-token-reviewer-token -n kube-system \
#     -o jsonpath='{.data.token}' | base64 -d
#
apiVersion: v1
kind: Secret
metadata:
  name: gateway-token-reviewer-token
  namespace: kube-system
  annotations:
    kubernetes.io/service-account.name: gateway-token-reviewer
  labels:
    app.kubernetes.io/part-of: akeyless-integration
    app.kubernetes.io/component: token-reviewer
    app.kubernetes.io/managed-by: kubectl
type: kubernetes.io/service-account-token
