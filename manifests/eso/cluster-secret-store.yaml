---
# ClusterSecretStore: Cluster-scoped ESO resource that defines how to connect
# and authenticate to Akeyless. Can be referenced by ExternalSecret resources
# in any namespace.
#
# Prerequisites:
#   - ESO installed in the cluster
#   - Akeyless K8s auth method created for this cluster
#   - Gateway reachable from ESO pods
#
# Replace the following placeholders before applying:
#   <GATEWAY_URL>              - Akeyless Gateway hostname (e.g., gateway.example.com)
#   <AUTH_METHOD_ACCESS_ID>    - Access ID from akeyless auth-method create k8s output
#   <CLUSTER_NAME>             - Cluster name used in the auth method path
#
# Usage:
#   kubectl apply -f cluster-secret-store.yaml
#
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: akeyless
  labels:
    app.kubernetes.io/part-of: akeyless-integration
    app.kubernetes.io/component: secret-store
    app.kubernetes.io/managed-by: kubectl
spec:
  provider:
    akeyless:
      # Akeyless Gateway API URL
      # For same-cluster deployment (ESO and Gateway on same cluster):
      akeylessGWApiURL: "http://<RELEASE_NAME>-akeyless-gateway-internal.<GATEWAY_NAMESPACE>.svc:8080"
      # For cross-cluster deployment:
      # akeylessGWApiURL: "https://<GATEWAY_EXTERNAL_URL>:8000/api/v2"

      # Authentication configuration using K8s auth method
      authSecretRef:
        kubernetesAuth:
          # Access ID of the K8s auth method created in Akeyless
          accessID: "<AUTH_METHOD_ACCESS_ID>"

          # Gateway K8s auth config name (from gateway-create-k8s-auth-config)
          k8sConfName: "<CLUSTER_NAME>-k8s-config"

          # ServiceAccount that ESO uses to generate tokens for authentication
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
