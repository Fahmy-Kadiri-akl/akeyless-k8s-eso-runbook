---
# ExternalSecret: Syncs a dynamic secret from Akeyless into a K8s Secret.
#
# Dynamic secrets are generated on-demand by Akeyless (e.g., temporary
# database credentials). The refreshInterval should be shorter than the
# dynamic secret's TTL to ensure credentials are rotated before expiry.
#
# Replace the following placeholders before applying:
#   <APP_NAME>            - Application name (e.g., my-app)
#   <NAMESPACE>           - Target namespace (e.g., my-app)
#   <DYNAMIC_SECRET_NAME> - Akeyless dynamic secret producer name
#                           (e.g., /dynamic-secrets/production/my-app-postgres)
#
# Usage:
#   kubectl apply -f external-secret-dynamic.yaml
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: <APP_NAME>-dynamic-creds
  namespace: <NAMESPACE>
  labels:
    app.kubernetes.io/part-of: akeyless-integration
    app.kubernetes.io/component: external-secret
    app.kubernetes.io/managed-by: kubectl
spec:
  # Refresh interval should be less than the dynamic secret TTL
  # Example: if TTL is 1 hour, refresh every 30 minutes
  refreshInterval: 30m

  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore

  target:
    name: <APP_NAME>-dynamic-creds
    creationPolicy: Owner

  data:
    - secretKey: credentials
      remoteRef:
        key: <DYNAMIC_SECRET_NAME>      # e.g., /dynamic-secrets/production/my-app-postgres
