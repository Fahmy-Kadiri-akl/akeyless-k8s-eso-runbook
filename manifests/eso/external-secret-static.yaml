---
# ExternalSecret: Syncs a static secret from Akeyless into a K8s Secret.
#
# This example fetches multiple keys from Akeyless and combines them into
# a single K8s Secret with multiple data keys.
#
# Replace the following placeholders before applying:
#   <APP_NAME>       - Application name (e.g., my-app)
#   <NAMESPACE>      - Target namespace (e.g., my-app)
#   <SECRET_PATH_*>  - Full Akeyless secret path (e.g., /production/my-app/db-password)
#
# Usage:
#   kubectl apply -f external-secret-static.yaml
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: <APP_NAME>-credentials
  namespace: <NAMESPACE>
  labels:
    app.kubernetes.io/part-of: akeyless-integration
    app.kubernetes.io/component: external-secret
    app.kubernetes.io/managed-by: kubectl
spec:
  # How often ESO re-fetches the secret from Akeyless
  refreshInterval: 5m

  # Reference to the ClusterSecretStore
  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore

  # Target K8s Secret configuration
  target:
    name: <APP_NAME>-credentials
    creationPolicy: Owner      # ESO creates and owns the K8s Secret
    deletionPolicy: Retain     # Keep K8s Secret if ExternalSecret is deleted (safety)

  # Secret data mapping: Akeyless path -> K8s Secret key
  data:
    - secretKey: username
      remoteRef:
        key: <SECRET_PATH_USERNAME>     # e.g., /production/my-app/db-username

    - secretKey: password
      remoteRef:
        key: <SECRET_PATH_PASSWORD>     # e.g., /production/my-app/db-password

    - secretKey: connection-string
      remoteRef:
        key: <SECRET_PATH_CONN_STRING>  # e.g., /production/my-app/db-connection-string
