---
# ExternalSecret: Syncs a rotated secret from Akeyless into a K8s Secret.
#
# Rotated secrets are managed by Akeyless' automatic rotation feature.
# Akeyless rotates the secret value on a configured schedule (e.g., every
# 30 days). ESO picks up the new value on the next refresh cycle.
#
# Replace the following placeholders before applying:
#   <APP_NAME>             - Application name (e.g., my-app)
#   <NAMESPACE>            - Target namespace (e.g., my-app)
#   <ROTATED_SECRET_PATH>  - Akeyless rotated secret path
#                            (e.g., /rotated-secrets/production/api-key)
#
# Usage:
#   kubectl apply -f external-secret-rotated.yaml
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: <APP_NAME>-rotated-secret
  namespace: <NAMESPACE>
  labels:
    app.kubernetes.io/part-of: akeyless-integration
    app.kubernetes.io/component: external-secret
    app.kubernetes.io/managed-by: kubectl
spec:
  # Short refresh interval to pick up rotations quickly
  refreshInterval: 5m

  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore

  target:
    name: <APP_NAME>-rotated-secret
    creationPolicy: Owner

  data:
    - secretKey: api-key
      remoteRef:
        key: <ROTATED_SECRET_PATH>      # e.g., /rotated-secrets/production/api-key
